name: CI/CD Hola Mundo Java

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  tests-jacoco:
    name: Tests and JaCoCo
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Ejecutar pruebas con JaCoCo
        run: ./mvnw -B verify

      - name: Subir reporte JaCoCo
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

  sonarcloud:
    name: SonarCloud Quality Gate
    needs: tests-jacoco
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ORGANIZATION: marcoisg
      SONAR_PROJECT_KEY: MarcoISG_Devops-3
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Validar configuracion SonarCloud
        if: github.event_name != 'pull_request' && env.SONAR_TOKEN == ''
        run: |
          echo "Falta configurar el secret SONAR_TOKEN"
          exit 1

      - name: Avisar SonarCloud omitido en PR externo
        if: github.event_name == 'pull_request' && env.SONAR_TOKEN == ''
        run: echo "SonarCloud se ejecutara al hacer push en main, cuando GitHub entregue secrets y variables."

      - name: Compilar para SonarCloud
        if: env.SONAR_TOKEN != ''
        run: ./mvnw -B -DskipTests package

      - name: Descargar reporte JaCoCo
        if: env.SONAR_TOKEN != ''
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

      - name: Analizar en SonarCloud
        if: env.SONAR_TOKEN != ''
        run: |
          ./mvnw -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization="$SONAR_ORGANIZATION" \
            -Dsonar.projectKey="$SONAR_PROJECT_KEY" \
            -Dsonar.qualitygate.wait=true

  docker-build:
    name: Docker Build
    needs: sonarcloud
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Construir imagen Docker
        run: docker build -t hola-mundo-devops:${{ github.sha }} .

  deploy:
    name: Deploy to AWS EC2 with Docker Compose
    needs: docker-build
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    runs-on:
      - self-hosted
      - ep3
      - deploy
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Desplegar con Docker Compose
        run: |
          docker compose up -d --build --remove-orphans
          docker compose ps

      - name: Validar servicio desplegado
        run: |
          sleep 5
          curl --fail http://localhost:8082/
