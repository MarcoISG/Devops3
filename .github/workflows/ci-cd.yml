name: CI/CD Hola Mundo Java

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  tests-jacoco:
    name: Tests and JaCoCo
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Ejecutar pruebas con JaCoCo
        run: ./mvnw -B verify

      - name: Subir reporte JaCoCo
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

  sonarcloud:
    name: SonarCloud Quality Gate
    needs: tests-jacoco
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Compilar para SonarCloud
        run: ./mvnw -B -DskipTests package

      - name: Descargar reporte JaCoCo
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

      - name: Analizar en SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
        run: |
          test -n "$SONAR_TOKEN" || (echo "Falta configurar el secret SONAR_TOKEN" && exit 1)
          test -n "$SONAR_ORGANIZATION" || (echo "Falta configurar la variable SONAR_ORGANIZATION" && exit 1)
          test -n "$SONAR_PROJECT_KEY" || (echo "Falta configurar la variable SONAR_PROJECT_KEY" && exit 1)
          ./mvnw -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization="$SONAR_ORGANIZATION" \
            -Dsonar.projectKey="$SONAR_PROJECT_KEY" \
            -Dsonar.qualitygate.wait=true

  docker-build:
    name: Docker Build
    needs: sonarcloud
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Construir imagen Docker
        run: docker build -t hola-mundo-devops:${{ github.sha }} .

  deploy:
    name: Deploy to AWS EC2 with Docker Compose
    needs: docker-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on:
      - self-hosted
      - ep3
      - deploy
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Desplegar con Docker Compose
        run: |
          docker compose up -d --build --remove-orphans
          docker compose ps

      - name: Validar servicio desplegado
        run: |
          sleep 5
          curl --fail http://localhost:8082/
